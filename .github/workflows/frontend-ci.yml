name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'todo-frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'todo-frontend/**'

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: todo-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix todo-frontend

      - name: Lint
        run: npm run lint --prefix todo-frontend

      - name: Run tests with coverage
        run: npm test --prefix todo-frontend

      - name: Build
        run: npm run build --prefix todo-frontend
        env:
          VITE_API_URL: http://localhost:3001

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20.x'
        with:
          name: frontend-dist
          path: todo-frontend/dist/
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '20.x'
        with:
          name: frontend-coverage
          path: todo-frontend/coverage/
          retention-days: 7